[package]
name = "hamming-bitwise-fast"
description = "A fast, zero-dependency implementation of bitwise Hamming Distance using a method amenable to auto-vectorization."
version = "1.0.0"
edition = "2021"
authors = ["Evan Schwartz"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/emschwartz/hamming-bitwise-fast"
documentation = "https://docs.rs/hamming-bitwise-fast"

[features]
default = []
multiversion_x86 = ["dep:multiversion"]

[dependencies]
multiversion = { version = "0.8", optional = true }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
hamming = "0.1.3"
simsimd = "6.2.1"
triple_accel = "0.4"
rand = "0.8"

[target.'cfg(target_arch = "x86")'.dev-dependencies]
hamming_rs = "0.2.22"

[target.'cfg(target_arch = "x86_64")'.dev-dependencies]
hamming_rs = "0.2.22"

[[bench]]
name = "q1_data_types"
harness = false

[[bench]]
name = "q2_arrays_vs_slices"
harness = false

[[bench]]
name = "q3_simd_dispatch"
harness = false

[[bench]]
name = "q4_batching"
harness = false

[[bench]]
name = "q5_vs_competitors"
harness = false

[[bench]]
name = "q6_slice_multiversion"
harness = false
